# C-a as prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config file
bind r source-file ~/.tmux.conf

# Mouse mode
set -g mouse on

# Set the default shell
set-option -g default-shell /usr/bin/nu

# No auto rename
set-option -g allow-rename off

# Start on 1
set -g base-index 1
setw -g pane-base-index 1

# Open new windows in CWD
unbind c
bind c new-window -c "#{pane_current_path}" 

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v "#{pane_current_path}"
unbind '"'
unbind %

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=green'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=blue'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=blue'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=white bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=white]#F '

setw -g window-status-bell-style 'fg=green bg=green bold'
